services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: kd_agent
      MYSQL_USER: kd_agent
      MYSQL_PASSWORD: kd_agent_local
      MYSQL_ROOT_PASSWORD: kd_agent_root_local
    ports: ["${MYSQL_PORT:-3306}:3306"]
    volumes: ["mysql_data:/var/lib/mysql"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pkd_agent_root_local"]
      interval: 5s
      timeout: 5s
      retries: 30

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    command: etcd --advertise-client-urls=http://etcd:2379 --listen-client-urls=http://0.0.0.0:2379

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /data --console-address :9001
    ports: ["9000:9000", "9001:9001"]

  milvus:
    image: milvusdb/milvus:v2.5.10
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports: ["19530:19530", "9091:9091"]
    depends_on: [etcd, minio]

  neo4j:
    image: neo4j:5.26-community
    environment:
      NEO4J_AUTH: neo4j/kd_agent_graph_local
    ports: ["7474:7474", "7687:7687"]
    volumes: ["neo4j_data:/data"]
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p kd_agent_graph_local 'RETURN 1' || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 30

volumes:
  mysql_data:
  neo4j_data:
